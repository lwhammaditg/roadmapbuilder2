<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roadmap Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0eff5;
  --surface:#ffffff;
  --border:#e8e6f0;
  --border2:#d4d0e8;
  --text:#1a1830;
  --text2:#6b6880;
  --text3:#a8a5be;
  --topbar-h:54px;
  --sidebar-w:272px;
  --accent:#6c5ce7;
  --accent-bg:#f0eeff;
  --accent-border:#c9bff5;
  --accent-text:#4c3db8;
  --violet:#6c5ce7; --violet-bg:#f0eeff; --violet-bdr:#c9bff5;
  --sky:#0ea5e9;    --sky-bg:#e0f5fe;    --sky-bdr:#bae7fd;
  --emerald:#00a86b;--emerald-bg:#e6faf3;--emerald-bdr:#a7f3d0;
  --amber:#d97706;  --amber-bg:#fef3c7;  --amber-bdr:#fde68a;
  --coral:#e5503a;  --coral-bg:#fee2db;  --coral-bdr:#fca68f;
  --pink:#db2777;   --pink-bg:#fce7f3;   --pink-bdr:#f9a8d4;
  --teal:#0d9488;   --teal-bg:#ccfbf1;   --teal-bdr:#99f6e4;
  --slate:#64748b;  --slate-bg:#f1f5f9;  --slate-bdr:#cbd5e1;
  --font-head:'Sora',sans-serif;
  --font-body:'Inter',sans-serif;
  --r-sm:6px; --r:10px; --r-lg:14px; --r-xl:20px;
  --shadow:0 2px 12px rgba(108,92,231,0.07),0 1px 3px rgba(0,0,0,0.05);
  --shadow-lg:0 8px 32px rgba(108,92,231,0.12),0 2px 8px rgba(0,0,0,0.08);
  --t:0.15s ease;
}
html{font-size:14px}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);height:100vh;overflow:hidden;line-height:1.5;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;grid-template-rows:var(--topbar-h) 1fr;height:100vh;overflow:hidden}

/* TOPBAR */
.topbar{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;background:var(--surface);border-bottom:1px solid var(--border);z-index:50;padding-right:20px}
.topbar-brand{width:var(--sidebar-w);flex-shrink:0;display:flex;align-items:center;gap:10px;padding:0 20px;border-right:1px solid var(--border);height:100%}
.brand-icon{width:30px;height:30px;background:var(--accent-bg);border:1.5px solid var(--accent-border);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-icon svg{width:15px;height:15px;stroke:var(--accent);fill:none;stroke-width:2.2}
.brand-name{font-family:var(--font-head);font-size:14px;font-weight:700;color:var(--text);letter-spacing:-0.3px}
.brand-name span{color:var(--accent)}
.topbar-center{flex:1;display:flex;align-items:center;padding:0 20px}
.title-wrap{display:flex;align-items:center;gap:7px;border:1px solid var(--border);border-radius:var(--r-sm);padding:5px 10px;background:var(--bg);transition:border-color var(--t)}
.title-wrap:focus-within{border-color:var(--accent-border);background:var(--surface)}
.title-wrap svg{width:12px;height:12px;stroke:var(--text3);fill:none;stroke-width:2;flex-shrink:0}
#canvas-title-input{background:transparent;border:none;outline:none;color:var(--text);font-family:var(--font-body);font-size:13px;font-weight:600;width:230px}
.topbar-actions{display:flex;align-items:center;gap:8px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;border:none;border-radius:var(--r-sm);padding:6px 13px;font-family:var(--font-body);font-size:12px;font-weight:500;cursor:pointer;transition:all var(--t);white-space:nowrap;line-height:1}
.btn:active{transform:scale(0.97)}
.btn svg{width:12px;height:12px;flex-shrink:0}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg);color:var(--text);border-color:var(--border2)}
.btn-primary{background:var(--accent);color:#fff;border:1px solid transparent;font-weight:600}
.btn-primary:hover{background:#5a4bd4;transform:translateY(-1px);box-shadow:0 4px 14px rgba(108,92,231,0.3)}
.btn-export{background:var(--accent);color:#fff;border:1px solid transparent;font-weight:600}
.btn-export:hover{background:#5a4bd4;transform:translateY(-1px);box-shadow:0 4px 14px rgba(108,92,231,0.3)}
.btn-export:disabled{opacity:0.6;cursor:not-allowed;transform:none;box-shadow:none}
.btn-clear{background:transparent;color:#e5503a;border:1px solid #fca68f}
.btn-clear:hover{background:#fee2db;border-color:#e5503a}
.btn-sm{padding:4px 9px;font-size:11px}
.btn-xs{padding:3px 7px;font-size:11px;border-radius:5px}
.btn-icon{width:26px;height:26px;padding:0;justify-content:center;border-radius:6px}
.btn-danger{background:transparent;color:#e5503a;border:1px solid #fca68f}
.btn-danger:hover{background:#fee2db;border-color:#e5503a}

/* SIDEBAR */
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-scroll{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:16px}
.sidebar-section{display:flex;flex-direction:column;gap:7px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1px}
.section-label{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3)}
.phase-chip{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--r);border:1px solid transparent;cursor:pointer;transition:all var(--t);position:relative}
.phase-chip::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;background:var(--chip-color,var(--accent));border-radius:0 3px 3px 0;opacity:0;transition:opacity var(--t)}
.phase-chip:hover{background:var(--bg);border-color:var(--border)}
.phase-chip:hover::before{opacity:1}
.phase-chip.active{background:var(--accent-bg);border-color:var(--accent-border)}
.phase-chip.active::before{opacity:1}
.chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.chip-label{flex:1;font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text2)}
.phase-chip.active .chip-label{color:var(--text)}
.chip-actions{display:flex;gap:2px;opacity:0;transition:opacity var(--t)}
.phase-chip:hover .chip-actions{opacity:1}
.tips-box{font-size:11px;color:var(--text3);line-height:1.9;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:10px 11px}

/* EDITOR PANEL */
.editor-panel{flex-shrink:0;border-top:1px solid var(--border);background:var(--surface);display:none;flex-direction:column;max-height:54vh;overflow:hidden}
.editor-panel.open{display:flex}
.editor-header{display:flex;align-items:center;gap:8px;padding:11px 14px 0;flex-shrink:0}
.editor-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.editor-title{font-size:11px;font-weight:600;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.editor-close{width:18px;height:18px;border-radius:4px;background:transparent;border:1px solid var(--border);color:var(--text3);cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;transition:all var(--t);line-height:1}
.editor-close:hover{background:var(--bg);color:var(--text)}
.editor-tabs{display:flex;padding:9px 14px 0;flex-shrink:0;border-bottom:1px solid var(--border)}
.editor-tab{padding:5px 11px;font-size:12px;font-weight:500;color:var(--text3);cursor:pointer;border:none;background:transparent;font-family:var(--font-body);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all var(--t)}
.editor-tab:hover{color:var(--text2)}
.editor-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.editor-body{flex:1;overflow-y:auto;padding:12px 14px}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:9px}
.field-label{font-size:11px;font-weight:500;color:var(--text3)}
.field-input,.field-textarea{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);padding:6px 9px;color:var(--text);font-family:var(--font-body);font-size:12px;outline:none;transition:border-color var(--t);width:100%}
.field-input:focus,.field-textarea:focus{border-color:var(--accent-border);background:var(--surface);box-shadow:0 0 0 3px rgba(108,92,231,0.08)}
.field-textarea{resize:vertical;min-height:50px;line-height:1.5}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.palette{display:flex;flex-wrap:wrap;gap:5px}
.palette-dot{width:20px;height:20px;border-radius:50%;cursor:pointer;transition:all var(--t);border:2px solid transparent}
.palette-dot:hover{transform:scale(1.18)}
.palette-dot.active{border-color:var(--surface);box-shadow:0 0 0 2.5px var(--dot-color)}
.group-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:9px;margin-bottom:7px}
.group-card-header{display:flex;align-items:center;gap:6px;margin-bottom:7px}
.group-color-bar{width:3px;height:18px;border-radius:2px;flex-shrink:0}
.group-name-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:12px;font-weight:600;font-family:var(--font-body)}
.group-icon-input{width:34px;text-align:center;background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:3px;font-size:11px;color:var(--text);outline:none;font-family:var(--font-body)}
.feature-row{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--border)}
.feature-row:last-child{border-bottom:none}
.status-btn{width:17px;height:17px;border-radius:50%;flex-shrink:0;border:1.5px solid;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;transition:all var(--t);background:transparent;font-family:var(--font-body);line-height:1}
.s-planned{border-color:var(--border2);color:var(--text3)}
.s-progress{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.s-done{border-color:var(--emerald);color:var(--emerald);background:var(--emerald-bg)}
.feature-text-input{flex:1;background:transparent;border:none;outline:none;color:var(--text2);font-size:12px;font-family:var(--font-body)}
.feature-text-input:focus{color:var(--text)}
.add-feature-row{width:100%;background:transparent;border:1px dashed var(--border2);border-radius:5px;padding:5px;font-size:11px;color:var(--text3);cursor:pointer;font-family:var(--font-body);margin-top:4px;transition:all var(--t)}
.add-feature-row:hover{border-color:var(--accent-border);color:var(--accent);background:var(--accent-bg)}
.add-group-btn{width:100%;background:transparent;border:1px dashed var(--border2);border-radius:var(--r);padding:8px;font-size:12px;color:var(--text3);cursor:pointer;font-family:var(--font-body);margin-top:3px;transition:all var(--t)}
.add-group-btn:hover{border-color:var(--accent-border);color:var(--accent);background:var(--accent-bg)}

/* MAIN CANVAS */
.main{display:flex;flex-direction:column;overflow:hidden;background:var(--bg);position:relative}
.canvas-wrap{flex:1;overflow:auto;padding:32px 40px}
.canvas-grid{display:flex;flex-direction:row;gap:0;align-items:flex-start;min-width:max-content}

/* CONNECTOR */
.phase-connector{display:flex;align-items:flex-start;padding-top:74px;flex-shrink:0}
.connector-track{display:flex;align-items:center;width:48px}
.connector-line{height:2px;flex:1;background:var(--border2)}
.connector-node{width:14px;height:14px;border-radius:50%;flex-shrink:0}

/* PHASE CARD — matches reference */
.phase-card-wrap{position:relative;animation:cardIn 0.35s cubic-bezier(0.4,0,0.2,1) both}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.phase-card{width:370px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-xl);padding:26px 28px;cursor:pointer;transition:box-shadow 0.2s ease,border-color 0.2s ease,transform 0.2s ease;position:relative;box-shadow:var(--shadow)}
.phase-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px);border-color:var(--border2)}
.phase-card.selected{border-color:var(--accent-border);box-shadow:0 0 0 2px var(--accent-border),var(--shadow-lg)}

/* Card period badge */
.card-header-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.card-period-badge{display:inline-flex;align-items:center;padding:4px 11px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase}
.card-icon-box{width:40px;height:40px;border:1.5px solid var(--border2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
/* Large serif title */
.card-title{font-family:var(--font-head);font-size:23px;font-weight:700;letter-spacing:-0.4px;line-height:1.2;margin-bottom:10px}
/* Focus line */
.card-focus{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:22px}
.card-focus-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
/* Feature group — thick left border, matching reference */
.feat-group{padding-left:18px;margin-bottom:22px}
.feat-group:last-child{margin-bottom:0}
.feat-group-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.feat-group-icon{font-size:16px;flex-shrink:0}
.feat-group-name{font-family:var(--font-head);font-size:15px;font-weight:700;letter-spacing:-0.2px}
.feat-item{display:flex;align-items:flex-start;gap:9px;padding:3px 0;font-size:13px;color:var(--text2);line-height:1.5}
.feat-item svg{width:16px;height:16px;flex-shrink:0;margin-top:1px}

/* EMPTY STATE */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;text-align:center;gap:16px;animation:fadeIn 0.4s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.empty-icon{width:68px;height:68px;border-radius:18px;background:var(--accent-bg);border:1.5px solid var(--accent-border);display:flex;align-items:center;justify-content:center;font-size:28px}
.empty-title{font-family:var(--font-head);font-size:21px;font-weight:700;color:var(--text);letter-spacing:-0.3px}
.empty-sub{font-size:13px;color:var(--text3);max-width:270px;line-height:1.7}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(26,24,48,0.4);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.2s ease}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-xl);padding:26px;width:400px;max-width:calc(100vw - 40px);max-height:calc(100vh - 60px);overflow-y:auto;box-shadow:0 24px 64px rgba(108,92,231,0.18)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-family:var(--font-head);font-size:17px;font-weight:700;color:var(--text);letter-spacing:-0.3px}
.modal-close{width:26px;height:26px;border-radius:6px;background:transparent;border:1px solid var(--border);color:var(--text3);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all var(--t);line-height:1}
.modal-close:hover{background:var(--bg);color:var(--text)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* TOAST */
.toast-container{position:fixed;bottom:18px;right:18px;z-index:500;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:9px 14px;font-size:12px;color:var(--text);display:flex;align-items:center;gap:8px;box-shadow:0 4px 18px rgba(0,0,0,0.12);animation:toastIn 0.25s cubic-bezier(0.34,1.56,0.64,1);min-width:180px}
@keyframes toastIn{from{opacity:0;transform:translateX(14px) scale(0.96)}to{opacity:1;transform:translateX(0) scale(1)}}
.toast.success{border-left:3px solid #00a86b}
.toast.error{border-left:3px solid #e5503a}
.toast.info{border-left:3px solid var(--accent)}

/* STATUS BAR */
.statusbar{display:flex;align-items:center;gap:12px;padding:7px 20px;border-top:1px solid var(--border);background:var(--surface);font-size:11px;color:var(--text3);flex-shrink:0}
.statusbar-dot{width:6px;height:6px;border-radius:50%;background:#00a86b}

#export-root{position:fixed;left:-9999px;top:0;z-index:-1}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="toast-container" id="toast-container"></div>
<div id="export-root"></div>

<!-- MODAL -->
<div class="modal-overlay" id="phase-modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">New phase</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="field">
      <div class="field-label">Phase title</div>
      <input class="field-input" id="m-title" placeholder="e.g. Phase 1: Core Evolution">
    </div>
    <div class="field-row">
      <div class="field"><div class="field-label">Time period</div>
        <input class="field-input" id="m-period" placeholder="e.g. Q2–Q3: May–Sep">
      </div>
      <div class="field"><div class="field-label">Focus / version</div>
        <input class="field-input" id="m-focus" placeholder="e.g. v1.0.0">
      </div>
    </div>
    <div class="field"><div class="field-label">Icon (emoji)</div>
      <input class="field-input" id="m-icon" maxlength="4" value="📋" style="width:68px">
    </div>
    <div class="field"><div class="field-label">Phase color</div>
      <div class="palette" id="modal-palette"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitPhase()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Create phase
      </button>
    </div>
  </div>
</div>

<div class="app">
  <div class="topbar">
    <div class="topbar-brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24"><path d="M3 12h4l3-8 4 16 3-8h4"/></svg>
      </div>
      <div class="brand-name">Roadmap<span>Builder</span></div>
    </div>
    <div class="topbar-center">
      <div class="title-wrap">
        <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>
        <input id="canvas-title-input" oninput="updateTitle(this.value)" placeholder="Your Roadmap Title">
      </div>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-clear btn-sm" onclick="clearAll()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        Clear
      </button>
      <button class="btn btn-export" id="export-btn" onclick="exportPNG()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export PNG
      </button>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-scroll">
      <div class="sidebar-section">
        <div class="section-header">
          <div class="section-label">Phases</div>
          <button class="btn btn-ghost btn-xs" onclick="openModal()">+ Add</button>
        </div>
        <div id="phase-list"></div>
      </div>
      <div class="sidebar-section">
        <div class="section-label" style="margin-bottom:5px">Quick tips</div>
        <div class="tips-box">
          <div>🎯 Click a phase card to edit it</div>
          <div>↔️ Use ← → to reorder phases</div>
          <div>🎨 Pick colors in the Style tab</div>
          <div>✓ Click status circles to cycle</div>
          <div>📸 Export saves a high-res PNG</div>
        </div>
      </div>
    </div>
    <div class="editor-panel" id="editor-panel">
      <div class="editor-header">
        <div class="editor-dot" id="editor-dot"></div>
        <div class="editor-title" id="editor-title">Select a phase</div>
        <button class="editor-close" onclick="deselect()">✕</button>
      </div>
      <div class="editor-tabs">
        <button class="editor-tab active" onclick="switchTab('info')" id="tab-btn-info">Info</button>
        <button class="editor-tab" onclick="switchTab('groups')" id="tab-btn-groups">Groups</button>
        <button class="editor-tab" onclick="switchTab('style')" id="tab-btn-style">Style</button>
      </div>
      <div class="editor-body" id="editor-body"></div>
    </div>
  </div>

  <div class="main">
    <div class="canvas-wrap" id="canvas-wrap">
      <div class="canvas-grid" id="roadmap-canvas"></div>
    </div>
    <div class="statusbar">
      <div class="statusbar-dot"></div>
      <span id="status-text">Ready</span>
      <span style="margin-left:auto;opacity:0.5">Auto-saved</span>
    </div>
  </div>
</div>

<script>
const PALETTE = [
  {name:'violet', hex:'#6c5ce7', bg:'#f0eeff', bdr:'#c9bff5'},
  {name:'sky',    hex:'#0ea5e9', bg:'#e0f5fe', bdr:'#bae7fd'},
  {name:'emerald',hex:'#00a86b', bg:'#e6faf3', bdr:'#a7f3d0'},
  {name:'amber',  hex:'#d97706', bg:'#fef3c7', bdr:'#fde68a'},
  {name:'coral',  hex:'#e5503a', bg:'#fee2db', bdr:'#fca68f'},
  {name:'pink',   hex:'#db2777', bg:'#fce7f3', bdr:'#f9a8d4'},
  {name:'teal',   hex:'#0d9488', bg:'#ccfbf1', bdr:'#99f6e4'},
  {name:'slate',  hex:'#64748b', bg:'#f1f5f9', bdr:'#cbd5e1'},
];
const STATUS_ORDER = ['planned','progress','done'];
const STATUS_SBTN  = {planned:'s-planned', progress:'s-progress', done:'s-done'};
const STATUS_LABEL = {planned:'○', progress:'◐', done:'✓'};

/* Circle-check SVG icon matching reference design */
function checkIcon(status, color){
  const s = `stroke="${color}" fill="none" stroke-width="1.5"`;
  const circle = `<circle cx="8" cy="8" r="7" ${s}/>`;
  const check  = status === 'done'    ? `<polyline points="5,8.5 7,10.5 11,6" ${s} stroke-linecap="round" stroke-linejoin="round"/>` : '';
  const clock  = status === 'progress'? `<path d="M8 5v3l2 2" ${s} stroke-linecap="round"/>` : '';
  return `<svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">${circle}${check}${clock}</svg>`;
}

/* ── STATE ── */
let S = {title:'Product Roadmap 2025', phases:[], selected:null, tab:'info', modalColor:'violet'};
let idSeed = Date.now();
const uid = () => 'id' + (idSeed++);
const col  = n => PALETTE.find(c => c.name === n) || PALETTE[0];
const phase= id=> S.phases.find(p => p.id === id);
const esc  = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');

/* title color: index 0 → black, others → phase color */
const titleColor = (idx, colorName) => idx === 0 ? '#1a1830' : col(colorName).hex;

/* ── PERSIST ── */
const save = () => { try{ localStorage.setItem('rmb6', JSON.stringify(S)); }catch(e){} };
const load = () => { try{ const d=localStorage.getItem('rmb6'); if(d){S=JSON.parse(d);return true;} }catch(e){} return false; };

/* ── TOAST ── */
function toast(msg, type='info', icon='ℹ️'){
  const c=document.getElementById('toast-container');
  const t=document.createElement('div'); t.className=`toast ${type}`;
  t.innerHTML=`<span>${icon}</span><span>${esc(msg)}</span>`;
  c.appendChild(t);
  setTimeout(()=>{ t.style.cssText+='opacity:0;transform:translateX(12px);transition:all 0.22s'; setTimeout(()=>t.remove(),240); }, 2600);
}

/* ── MODAL ── */
function openModal(){
  ['m-title','m-period','m-focus'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('m-icon').value='📋';
  S.modalColor='violet';
  rpal('modal-palette', ()=>S.modalColor, v=>{ S.modalColor=v; rpal('modal-palette',()=>S.modalColor,arguments.callee); });
  document.getElementById('phase-modal').style.display='flex';
  setTimeout(()=>document.getElementById('m-title').focus(),60);
}
function closeModal(){ document.getElementById('phase-modal').style.display='none'; }
function submitPhase(){
  const t=document.getElementById('m-title').value.trim();
  if(!t){ toast('Please enter a phase title','error','❌'); document.getElementById('m-title').focus(); return; }
  const p={
    id:uid(), title:t,
    period:document.getElementById('m-period').value.trim()||'Q1–Q2',
    focus: document.getElementById('m-focus').value.trim() ||'v1.0.0',
    icon:  document.getElementById('m-icon').value.trim()  ||'📋',
    color:S.modalColor, iconColor:S.modalColor, groups:[]
  };
  S.phases.push(p); closeModal(); save(); renderAll(); selectPhase(p.id);
  toast('Phase created!','success','✅');
}

/* ── PALETTE HELPER ── */
function rpal(id, getCur, onPick){
  const el=document.getElementById(id); if(!el) return;
  const cur=getCur(); el.innerHTML='';
  PALETTE.forEach(c=>{
    const d=document.createElement('div');
    d.className='palette-dot'+(cur===c.name?' active':'');
    d.style.cssText=`background:${c.hex};--dot-color:${c.hex}`; d.title=c.name;
    d.onclick=()=>onPick(c.name);
    el.appendChild(d);
  });
}

/* ── SELECT / DESELECT ── */
function selectPhase(id){
  S.selected=id;
  document.querySelectorAll('.phase-chip').forEach(el=>el.classList.toggle('active',el.dataset.id===id));
  document.querySelectorAll('.phase-card').forEach(el=>el.classList.toggle('selected',el.dataset.id===id));
  const p=phase(id); if(!p) return;
  document.getElementById('editor-panel').classList.add('open');
  document.getElementById('editor-dot').style.background=col(p.color).hex;
  document.getElementById('editor-title').textContent=p.title.length>30?p.title.slice(0,30)+'…':p.title;
  switchTab(S.tab);
}
function deselect(){
  S.selected=null;
  document.querySelectorAll('.phase-chip').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.phase-card').forEach(el=>el.classList.remove('selected'));
  document.getElementById('editor-panel').classList.remove('open');
}

/* ── TABS ── */
function switchTab(tab){
  S.tab=tab;
  ['info','groups','style'].forEach(t=>document.getElementById('tab-btn-'+t).classList.toggle('active',t===tab));
  const p=phase(S.selected); if(!p) return;
  const body=document.getElementById('editor-body');
  if(tab==='info'){
    body.innerHTML=`
      <div class="field"><div class="field-label">Phase title</div>
        <input class="field-input" value="${esc(p.title)}" oninput="patchInfo('title',this.value)"></div>
      <div class="field-row">
        <div class="field"><div class="field-label">Time period</div>
          <input class="field-input" value="${esc(p.period)}" oninput="patchInfo('period',this.value)"></div>
        <div class="field"><div class="field-label">Focus / version</div>
          <input class="field-input" value="${esc(p.focus)}" oninput="patchInfo('focus',this.value)"></div>
      </div>
      <div class="field"><div class="field-label">Icon (emoji)</div>
        <input class="field-input" maxlength="4" value="${esc(p.icon||'')}" oninput="patchInfo('icon',this.value)" style="width:68px"></div>`;
  } else if(tab==='groups'){
    renderGroupsTab(p);
  } else {
    body.innerHTML=`
      <div class="field"><div class="field-label">Phase accent color</div><div class="palette" id="sty-p"></div></div>
      <div class="field" style="margin-top:8px"><div class="field-label">Icon color</div><div class="palette" id="sty-i"></div></div>`;
    rpal('sty-p', ()=>phase(S.selected)?.color||'violet', v=>{ const p=phase(S.selected);if(p){p.color=v;save();renderAll();switchTab('style');} });
    rpal('sty-i', ()=>phase(S.selected)?.iconColor||phase(S.selected)?.color||'violet', v=>{ const p=phase(S.selected);if(p){p.iconColor=v;save();renderAll();switchTab('style');} });
  }
}

/* ── DEBOUNCED INFO PATCH ── */
let _pt=null;
function patchInfo(key,val){
  const p=phase(S.selected); if(!p) return;
  p[key]=val;
  if(key==='title'){ const et=document.getElementById('editor-title'); if(et) et.textContent=val.length>30?val.slice(0,30)+'…':val; }
  clearTimeout(_pt);
  _pt=setTimeout(()=>{ save(); renderCanvas(); renderSidebar(); updateStatus(); },250);
}

/* ── GROUPS TAB ── */
function renderGroupsTab(p){
  const body=document.getElementById('editor-body'); body.innerHTML='';
  (p.groups||[]).forEach((g,gi)=>{
    const gc=col(g.color||'violet');
    const card=document.createElement('div'); card.className='group-card';
    card.innerHTML=`<div class="group-card-header">
      <div class="group-color-bar" style="background:${gc.hex}"></div>
      <input class="group-name-input" value="${esc(g.name)}" placeholder="Group name" oninput="patchGroup(${gi},'name',this.value)">
      <input class="group-icon-input" maxlength="4" value="${esc(g.icon||'')}" placeholder="🏷" oninput="patchGroup(${gi},'icon',this.value)">
      <button class="btn btn-danger btn-icon btn-sm" onclick="removeGroup(${gi})">✕</button>
    </div>`;
    const pal=document.createElement('div'); pal.className='palette'; pal.style.marginBottom='7px'; pal.id=`gpal-${gi}`;
    card.appendChild(pal);
    const feats=document.createElement('div'); feats.id=`gfeats-${gi}`; card.appendChild(feats);
    const ab=document.createElement('button'); ab.className='add-feature-row'; ab.textContent='+ add feature'; ab.onclick=()=>addFeature(gi);
    card.appendChild(ab); body.appendChild(card);
    rpal(`gpal-${gi}`, ()=>phase(S.selected)?.groups[gi]?.color||'violet', v=>{ patchGroup(gi,'color',v); rpal(`gpal-${gi}`,()=>phase(S.selected)?.groups[gi]?.color||'violet',arguments.callee); });
    renderFeats(gi, g);
  });
  const ag=document.createElement('button'); ag.className='add-group-btn'; ag.textContent='+ add feature group'; ag.onclick=addGroup;
  body.appendChild(ag);
}
function renderFeats(gi, g){
  const el=document.getElementById(`gfeats-${gi}`); if(!el) return;
  el.innerHTML='';
  (g.features||[]).forEach((f,fi)=>{
    const sc=f.status||'planned';
    const row=document.createElement('div'); row.className='feature-row';
    row.innerHTML=`
      <button class="status-btn ${STATUS_SBTN[sc]}" onclick="cycleStatus(${gi},${fi})" title="Cycle status">${STATUS_LABEL[sc]}</button>
      <input class="feature-text-input" value="${esc(f.text)}" placeholder="Feature description…" oninput="patchFeat(${gi},${fi},'text',this.value)">
      <button class="btn btn-danger btn-icon btn-xs" onclick="removeFeat(${gi},${fi})">✕</button>`;
    el.appendChild(row);
  });
}
function patchGroup(gi,k,v){ const p=phase(S.selected);if(!p)return; p.groups[gi][k]=v; save();renderCanvas();renderSidebar(); }
function patchFeat(gi,fi,k,v){ const p=phase(S.selected);if(!p)return; p.groups[gi].features[fi][k]=v; save();renderCanvas(); }
function addGroup(){ const p=phase(S.selected);if(!p)return; p.groups.push({id:uid(),name:'New Group',icon:'📌',color:'violet',features:[]}); save();renderCanvas();renderSidebar();renderGroupsTab(p); }
function removeGroup(gi){ const p=phase(S.selected);if(!p)return; p.groups.splice(gi,1); save();renderCanvas();renderSidebar();renderGroupsTab(p); }
function addFeature(gi){ const p=phase(S.selected);if(!p)return; if(!p.groups[gi].features)p.groups[gi].features=[]; p.groups[gi].features.push({id:uid(),text:'New feature',status:'planned'}); save();renderCanvas();renderFeats(gi,p.groups[gi]); }
function removeFeat(gi,fi){ const p=phase(S.selected);if(!p)return; p.groups[gi].features.splice(fi,1); save();renderCanvas();renderFeats(gi,p.groups[gi]); }
function cycleStatus(gi,fi){ const p=phase(S.selected);if(!p)return; const cur=p.groups[gi].features[fi].status||'planned'; p.groups[gi].features[fi].status=STATUS_ORDER[(STATUS_ORDER.indexOf(cur)+1)%3]; save();renderCanvas();renderFeats(gi,p.groups[gi]); }

/* ── DELETE / MOVE ── */
function deletePhase(id){ S.phases=S.phases.filter(p=>p.id!==id); if(S.selected===id){S.selected=null;document.getElementById('editor-panel').classList.remove('open');} save();renderAll();toast('Phase deleted','info','🗑'); }
function movePhase(id,dir){ const i=S.phases.findIndex(p=>p.id===id),ni=i+dir; if(ni<0||ni>=S.phases.length)return; [S.phases[i],S.phases[ni]]=[S.phases[ni],S.phases[i]]; save();renderAll(); }

/* ── CLEAR ALL — fully resets state ── */
function clearAll(){
  if(!S.phases||!S.phases.length){ toast('Nothing to clear','info','ℹ️'); return; }
  if(!confirm('Clear all phases? This cannot be undone.')) return;
  S = {title:'', phases:[], selected:null, tab:'info', modalColor:'violet'};
  document.getElementById('canvas-title-input').value='';
  document.getElementById('editor-panel').classList.remove('open');
  try{ localStorage.removeItem('rmb6'); }catch(e){}
  renderAll();
  toast('Cleared','info','🧹');
}

function updateTitle(v){ S.title=v; save(); updateStatus(); }
function updateStatus(){
  const n=S.phases?.length||0, f=S.phases?.reduce((a,p)=>a+(p.groups||[]).reduce((b,g)=>b+(g.features||[]).length,0),0)||0;
  document.getElementById('status-text').textContent=`${n} phase${n!==1?'s':''} · ${f} feature${f!==1?'s':''}`;
}

/* ── RENDER ── */
function renderAll(){ renderSidebar(); renderCanvas(); updateStatus(); }

function renderSidebar(){
  const list=document.getElementById('phase-list'); list.innerHTML='';
  if(!S.phases?.length){
    list.innerHTML='<div style="font-size:11px;color:var(--text3);text-align:center;padding:10px 0;line-height:1.7">No phases yet.<br><b style="color:var(--accent)">+ Add</b> to start.</div>'; return;
  }
  S.phases.forEach(p=>{
    const c=col(p.color);
    const chip=document.createElement('div'); chip.className='phase-chip'+(p.id===S.selected?' active':''); chip.dataset.id=p.id;
    chip.style.setProperty('--chip-color',c.hex);
    chip.innerHTML=`<div class="chip-dot" style="background:${c.hex}"></div>
      <div class="chip-label">${esc(p.title)}</div>
      <div class="chip-actions">
        <button class="btn btn-ghost btn-icon btn-xs" onclick="event.stopPropagation();movePhase('${p.id}',-1)" title="Move left">←</button>
        <button class="btn btn-ghost btn-icon btn-xs" onclick="event.stopPropagation();movePhase('${p.id}',1)" title="Move right">→</button>
        <button class="btn btn-danger btn-icon btn-xs" onclick="event.stopPropagation();deletePhase('${p.id}')">✕</button>
      </div>`;
    chip.onclick=()=>selectPhase(p.id);
    list.appendChild(chip);
  });
}

function renderCanvas(){
  const canvas=document.getElementById('roadmap-canvas'); canvas.innerHTML='';
  if(!S.phases?.length){
    canvas.innerHTML=`<div class="empty-state">
      <div class="empty-icon">🗺️</div>
      <div class="empty-title">Build your roadmap</div>
      <div class="empty-sub">Click <strong>+ Add</strong> in the sidebar to create your first phase card.</div>
      <button class="btn btn-primary" onclick="openModal()" style="margin-top:6px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:12px;height:12px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add first phase
      </button></div>`; return;
  }
  S.phases.forEach((p,i)=>{
    if(i>0) canvas.appendChild(buildConnector(p.color));
    canvas.appendChild(buildCard(p,i));
  });
}

function buildConnector(colorName){
  const c=col(colorName);
  const w=document.createElement('div'); w.className='phase-connector';
  w.innerHTML=`<div class="connector-track">
    <div class="connector-line"></div>
    <div class="connector-node" style="background:${c.hex};box-shadow:0 0 0 3px var(--bg),0 0 0 5.5px ${c.bdr}"></div>
  </div>`;
  return w;
}

function buildCard(p, idx){
  const c=col(p.color), ic=col(p.iconColor||p.color);
  const tc=titleColor(idx, p.color);
  const wrap=document.createElement('div'); wrap.className='phase-card-wrap';
  const card=document.createElement('div');
  card.className='phase-card'+(p.id===S.selected?' selected':''); card.dataset.id=p.id;

  let groupsHTML='';
  if(p.groups?.length){
    p.groups.forEach(g=>{
      const gc=col(g.color||'violet');
      const feats=(g.features||[]).map(f=>{
        const sc=f.status||'planned';
        return `<div class="feat-item">${checkIcon(sc,gc.hex)}<span>${esc(f.text)}</span></div>`;
      }).join('') || `<div class="feat-item" style="color:var(--text3);font-style:italic;font-size:12px">No features yet — click to add</div>`;
      groupsHTML+=`<div class="feat-group" style="border-left:3px solid ${gc.hex}">
        <div class="feat-group-header">
          <span class="feat-group-icon">${esc(g.icon||'')}</span>
          <span class="feat-group-name" style="color:${gc.hex}">${esc(g.name)}</span>
        </div>${feats}
      </div>`;
    });
  } else {
    groupsHTML=`<div style="font-size:12px;color:var(--text3);font-style:italic;padding:4px 0">Select this card and add groups in the Groups tab.</div>`;
  }

  card.innerHTML=`
    <div class="card-header-row">
      <div class="card-period-badge" style="background:${c.bg};color:${c.hex}">${esc(p.period||'')}</div>
      <div class="card-icon-box" style="border-color:${ic.bdr};background:${ic.bg}">${esc(p.icon||'📋')}</div>
    </div>
    <div class="card-title" style="color:${tc}">${esc(p.title)}</div>
    <div class="card-focus" style="color:${c.hex}">
      <div class="card-focus-dot" style="background:${c.hex}"></div>
      FOCUS: ${esc(p.focus||'')}
    </div>
    ${groupsHTML}`;
  card.onclick=()=>selectPhase(p.id);
  wrap.appendChild(card); return wrap;
}

/* ── EXPORT PNG — inline-styles only, no external fonts ── */
async function exportPNG(){
  if(!S.phases?.length){ toast('Add phases before exporting','error','❌'); return; }
  const btn=document.getElementById('export-btn'), orig=btn.innerHTML;
  btn.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px;animation:spin 0.9s linear infinite"><path d="M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z" stroke-opacity="0.3"/><path d="M21 12a9 9 0 0 0-9-9"/></svg> Exporting…`;
  btn.disabled=true;
  try{
    const root=document.getElementById('export-root'); root.innerHTML='';
    const wrap=document.createElement('div');
    wrap.style.cssText='font-family:system-ui,-apple-system,sans-serif;background:#f0eff5;padding:48px 56px;display:inline-flex;flex-direction:column;gap:32px;min-width:max-content';
    const hdr=document.createElement('div');
    hdr.style.cssText='display:flex;align-items:center;justify-content:space-between;border-bottom:1.5px solid #e8e6f0;padding-bottom:20px;margin-bottom:4px';
    hdr.innerHTML=`<div style="font-size:26px;font-weight:700;color:#1a1830;letter-spacing:-0.4px">${esc(S.title||'Roadmap')}</div>
      <div style="font-size:11px;color:#a8a5be">${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</div>`;
    wrap.appendChild(hdr);
    const row=document.createElement('div'); row.style.cssText='display:flex;flex-direction:row;align-items:flex-start;gap:0';
    S.phases.forEach((p,i)=>{
      if(i>0){
        const c=col(p.color), conn=document.createElement('div');
        conn.style.cssText='display:flex;align-items:flex-start;padding-top:74px;flex-shrink:0';
        conn.innerHTML=`<div style="display:flex;align-items:center;width:48px">
          <div style="height:2px;flex:1;background:#d4d0e8"></div>
          <div style="width:14px;height:14px;border-radius:50%;background:${c.hex};box-shadow:0 0 0 3px #f0eff5,0 0 0 5.5px ${c.bdr};flex-shrink:0"></div>
        </div>`;
        row.appendChild(conn);
      }
      row.appendChild(buildExportCard(p,i));
    });
    wrap.appendChild(row);
    const ftr=document.createElement('div');
    ftr.style.cssText='font-size:11px;color:#a8a5be;text-align:right;border-top:1px solid #e8e6f0;padding-top:14px';
    ftr.textContent='Built with Roadmap Builder';
    wrap.appendChild(ftr);
    root.appendChild(wrap);
    await new Promise(r=>setTimeout(r,180));
    const cv=await html2canvas(wrap,{scale:2.5,useCORS:false,allowTaint:true,logging:false,backgroundColor:'#f0eff5',width:wrap.scrollWidth,height:wrap.scrollHeight,windowWidth:wrap.scrollWidth+200});
    root.innerHTML='';
    cv.toBlob(blob=>{
      const url=URL.createObjectURL(blob), a=document.createElement('a');
      a.href=url; a.download=(S.title||'roadmap').replace(/[^a-zA-Z0-9\-_]/g,'_')+'.png';
      document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
      toast('Exported!','success','📸');
    },'image/png');
  }catch(e){ console.error(e); toast('Export failed: '+e.message,'error','❌'); }
  finally{ btn.innerHTML=orig; btn.disabled=false; }
}

function buildExportCard(p, idx){
  const c=col(p.color), ic=col(p.iconColor||p.color), tc=titleColor(idx,p.color);
  const card=document.createElement('div');
  card.style.cssText='width:370px;background:#fff;border:1.5px solid #e8e6f0;border-radius:20px;padding:26px 28px;position:relative;overflow:hidden;font-family:system-ui,-apple-system,sans-serif;box-shadow:0 2px 12px rgba(108,92,231,0.07)';
  const bar=document.createElement('div'); bar.style.cssText=`position:absolute;top:0;left:0;right:0;height:3px;background:${c.hex}`; card.appendChild(bar);
  const hrow=document.createElement('div'); hrow.style.cssText='display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px';
  hrow.innerHTML=`<div style="display:inline-flex;padding:4px 11px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;background:${c.bg};color:${c.hex}">${esc(p.period||'')}</div>
    <div style="width:40px;height:40px;border:1.5px solid ${ic.bdr};border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:19px;background:${ic.bg}">${esc(p.icon||'📋')}</div>`;
  card.appendChild(hrow);
  const title=document.createElement('div'); title.style.cssText=`font-size:23px;font-weight:700;color:${tc};letter-spacing:-0.4px;line-height:1.2;margin-bottom:10px`; title.textContent=p.title||''; card.appendChild(title);
  const focus=document.createElement('div'); focus.style.cssText=`display:flex;align-items:center;gap:7px;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:${c.hex};margin-bottom:22px`;
  focus.innerHTML=`<div style="width:8px;height:8px;border-radius:50%;background:${c.hex};flex-shrink:0"></div>FOCUS: ${esc(p.focus||'')}`; card.appendChild(focus);
  (p.groups||[]).forEach(g=>{
    const gc=col(g.color||'violet');
    const grp=document.createElement('div'); grp.style.cssText=`padding-left:18px;border-left:3px solid ${gc.hex};margin-bottom:22px`;
    const ghdr=document.createElement('div'); ghdr.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:10px';
    ghdr.innerHTML=`<span style="font-size:16px">${esc(g.icon||'')}</span><span style="font-size:15px;font-weight:700;color:${gc.hex}">${esc(g.name)}</span>`;
    grp.appendChild(ghdr);
    (g.features||[]).forEach(f=>{
      const sc=f.status||'planned', dc={planned:'#d4d0e8',progress:'#6c5ce7',done:'#00a86b'}[sc];
      const fi=document.createElement('div'); fi.style.cssText='display:flex;align-items:flex-start;gap:9px;padding:3px 0;font-size:13px;color:#6b6880;line-height:1.5';
      fi.innerHTML=`<svg style="width:16px;height:16px;flex-shrink:0;margin-top:1px;stroke:${dc};fill:none;stroke-width:1.5" viewBox="0 0 16 16"><circle cx="8" cy="8" r="7"/>${sc==='done'?'<polyline points="5,8.5 7,10.5 11,6" stroke-linecap="round" stroke-linejoin="round"/>':sc==='progress'?'<path d="M8 5v3l2 2" stroke-linecap="round"/>':''}</svg><span>${esc(f.text)}</span>`;
      grp.appendChild(fi);
    });
    if(!(g.features?.length)){ const e=document.createElement('div'); e.style.cssText='font-size:12px;color:#a8a5be;font-style:italic'; e.textContent='No features'; grp.appendChild(e); }
    card.appendChild(grp);
  });
  if(!p.groups?.length){ const e=document.createElement('div'); e.style.cssText='font-size:12px;color:#a8a5be;font-style:italic'; e.textContent='No groups'; card.appendChild(e); }
  return card;
}
